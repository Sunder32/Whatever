# =============================================================================
# Production Docker Compose — Diagram App
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d --build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15.5-alpine
    container_name: diagram-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    # NO ports exposed — only reachable inside docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 7 (with password)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: diagram-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Go Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diagram-backend
    environment:
      PORT: "9000"
      ENVIRONMENT: "production"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      REDIS_ADDRESS: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRATION: "${JWT_EXPIRATION:-15m}"
      REFRESH_TOKEN_EXPIRATION: "${REFRESH_TOKEN_EXPIRATION:-168h}"
      PYTHON_SERVICE_URL: "http://python-service:5000"
      CORS_ORIGINS: "${CORS_ORIGINS}"
      GIN_MODE: release
      MIGRATIONS_DIR: /app/migrations
      MAX_FILE_SIZE: "${MAX_FILE_SIZE:-52428800}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - uploads_data:/app/uploads
      - ./migrations:/app/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Python Service (export, layout, encryption)
  # ---------------------------------------------------------------------------
  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: diagram-python
    environment:
      APP_NAME: "Diagram Python Service"
      APP_VERSION: "1.0.0"
      DEBUG: "false"
      HOST: "0.0.0.0"
      PORT: "5000"
      WORKERS: "4"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      GO_BACKEND_URL: "http://backend:9000"
      JWT_SECRET: "${JWT_SECRET}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      MAX_FILE_SIZE: "16777216"
      EXPORT_DEFAULT_DPI: "150"
      CORS_ORIGINS: "${CORS_ORIGINS}"
      LOG_LEVEL: "WARNING"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy + serves frontend static files
  # This is the ONLY container that exposes ports to the host.
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: diagram-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/app/uploads:ro
    depends_on:
      backend:
        condition: service_healthy
      python-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  internal:
    driver: bridge
