services:
  postgres:
    image: postgres:15.5-alpine
    container_name: diagram-postgres-dev
    environment:
      POSTGRES_USER: diagram
      POSTGRES_PASSWORD: diagram_dev
      POSTGRES_DB: diagram_db
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diagram -d diagram_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - diagram-dev-network

  redis:
    image: redis:7.2-alpine
    container_name: diagram-redis-dev
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - diagram-dev-network

  adminer:
    image: adminer:latest
    container_name: diagram-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - diagram-dev-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: diagram-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - diagram-dev-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diagram-backend-dev
    environment:
      PORT: "9000"
      DATABASE_URL: "postgresql://diagram:diagram_dev@postgres:5432/diagram_db?sslmode=disable"
      REDIS_ADDRESS: redis:6379
      JWT_SECRET: dev-secret-key-not-for-production
      JWT_EXPIRATION: 24h
      REFRESH_TOKEN_EXPIRATION: 168h
      PYTHON_SERVICE_URL: http://python-service:5000
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost:80"
      GIN_MODE: debug
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - diagram-dev-network

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: diagram-python-dev
    environment:
      DEBUG: "true"
      HOST: "0.0.0.0"
      PORT: 5000
      WORKERS: 2
      DATABASE_URL: "postgresql://diagram:diagram_dev@postgres:5432/diagram_db"
      REDIS_URL: "redis://redis:6379/0"
      GO_BACKEND_URL: "http://backend:9000"
      JWT_SECRET: dev-secret-key-not-for-production
      ENCRYPTION_KEY: dev-encryption-key-32-bytes-long
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - diagram-dev-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: diagram-frontend-dev
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:9000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - diagram-dev-network

  nginx:
    image: nginx:1.25-alpine
    container_name: diagram-nginx-dev
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      python-service:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - diagram-dev-network

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  diagram-dev-network:
    driver: bridge
