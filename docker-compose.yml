services:
  postgres:
    image: postgres:15.5-alpine
    container_name: diagram-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-diagram}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diagram_secret}
      POSTGRES_DB: ${POSTGRES_DB:-diagram_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diagram} -d ${POSTGRES_DB:-diagram_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - diagram-network
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: diagram-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - diagram-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diagram-backend
    environment:
      PORT: "9000"
      # ВАЖНО: Убедитесь, что пароль здесь совпадает с паролем в сервисе postgres
      DATABASE_URL: "postgresql://${POSTGRES_USER:-diagram}:${POSTGRES_PASSWORD:-diagram_secret}@postgres:5432/${POSTGRES_DB:-diagram_db}?sslmode=disable"
      REDIS_ADDRESS: redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRATION: 24h
      REFRESH_TOKEN_EXPIRATION: 168h
      PYTHON_SERVICE_URL: http://python-service:5000
      # ИСПРАВЛЕНО: Добавлен IP сервера для разрешения CORS запросов
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost,http://31.129.106.149"
      GIN_MODE: release
      MIGRATIONS_DIR: /app/migrations
    volumes:
      - uploads_data:/app/uploads
      - ./migrations:/app/migrations:ro
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - diagram-network
    restart: unless-stopped

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: diagram-python
    environment:
      APP_NAME: "Diagram Python Service"
      APP_VERSION: "1.0.0"
      DEBUG: "false"
      HOST: "0.0.0.0"
      PORT: 5000
      WORKERS: 4
      DATABASE_URL: "postgresql://${POSTGRES_USER:-diagram}:${POSTGRES_PASSWORD:-diagram_secret}@postgres:5432/${POSTGRES_DB:-diagram_db}"
      REDIS_URL: "redis://redis:6379/0"
      GO_BACKEND_URL: "http://backend:9000"
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-32-byte-encryption-key-here}
      MAX_EXPORT_SIZE: 16777216
      DEFAULT_DPI: 150
      ALLOWED_ORIGINS: "*"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - diagram-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: diagram-frontend
    environment:
      NODE_ENV: production
      VITE_API_URL: /api/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - diagram-network
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: diagram-nginx
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      python-service:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - diagram-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  diagram-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16